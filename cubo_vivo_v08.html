<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cubo Vivo — Prototipo v0.8</title>
<style>
:root{--bg:#071016;--panel:#0d1a22;--line:#2a4c5c;--text:#e7fbff;--muted:#81aab8;--cyan:#6ee7f2;--red:#ff6b6b;--btn:#102630;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:radial-gradient(circle at 50% 20%,#102431 0,#071016 50%,#04090d 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
body{display:flex;justify-content:center;align-items:stretch}
#app{position:relative;width:min(100vw,560px);height:100dvh;display:grid;grid-template-rows:auto 156px 1fr auto;gap:10px;padding:max(12px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom))}
.hud{display:flex;justify-content:space-between;align-items:flex-start;padding:2px 4px}.score{font-weight:800;letter-spacing:.12em;font-size:22px}.sub{font-size:12px;color:var(--muted);margin-top:3px}.status{text-align:right;font-size:12px;color:var(--muted)}
.preview-wrap{position:relative;border:1px solid rgba(110,231,242,.25);border-radius:18px;background:linear-gradient(180deg,rgba(27,69,84,.3),rgba(8,22,29,.5));box-shadow:inset 0 0 30px rgba(110,231,242,.05);padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:visible}
.preview-title{font-size:11px;letter-spacing:.18em;color:var(--muted);margin-bottom:8px}.preview{position:relative;width:196px;height:112px;margin-top:1px;flex:0 0 auto}.cell{position:absolute;width:52px;height:32px;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);background:rgba(5,18,24,.76);border:0;filter:drop-shadow(0 0 1px rgba(110,231,242,.65));display:grid;place-items:center}.cell::after{content:'';position:absolute;inset:2px;clip-path:inherit;border:1px solid rgba(110,231,242,.28)}.cell.active{background:rgba(81,24,32,.88);filter:drop-shadow(0 0 8px rgba(255,107,107,.72))}.cell.active::after{border-color:rgba(255,140,140,.95)}.dot{position:relative;z-index:2;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff 0 8%,#ffb0b0 10%,#ff6b6b 55%,#9b1825 100%);box-shadow:0 0 14px rgba(255,107,107,.8)}
.fall-ball{position:absolute;left:0;top:0;width:18px;height:18px;border-radius:50%;z-index:30;pointer-events:none;opacity:0;background:radial-gradient(circle at 35% 30%,#fff 0 8%,#ffb0b0 10%,#ff6b6b 55%,#9b1825 100%);box-shadow:0 0 16px rgba(255,107,107,.9);transform:translate(-50%,-50%)}
.countdown{position:absolute;right:12px;bottom:10px;font-variant-numeric:tabular-nums;font-weight:700;color:var(--cyan)}
.stage{position:relative;min-height:0;border-radius:22px;background:linear-gradient(180deg,rgba(9,25,33,.1),rgba(4,11,15,.45));overflow:hidden}
canvas{width:100%;height:100%;display:block;touch-action:none}.message{position:absolute;left:50%;top:8px;transform:translateX(-50%);padding:7px 12px;border-radius:999px;background:rgba(6,19,26,.78);border:1px solid rgba(110,231,242,.22);font-size:12px;color:#bfeef3;white-space:nowrap;opacity:0;transition:opacity .2s}.message.show{opacity:1}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px}.control{min-height:74px;border:1px solid rgba(110,231,242,.32);border-radius:18px;background:linear-gradient(180deg,#173541,#0c2029);color:var(--text);font-size:28px;font-weight:800;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 7px 22px rgba(0,0,0,.25);touch-action:manipulation}.control:active{transform:translateY(1px);background:#1b4350}.control:disabled{opacity:.38;filter:saturate(.45);transform:none}.control small{display:block;font-size:10px;letter-spacing:.15em;color:var(--muted);margin-top:4px}.restart{position:absolute;right:10px;top:10px;border:1px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(5,15,20,.6);color:#bfeef3;padding:7px 10px;font-size:11px}
.legend{position:absolute;left:10px;bottom:10px;font-size:10px;color:var(--muted);line-height:1.45;background:rgba(4,12,16,.55);padding:7px 9px;border-radius:10px}.key{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:-1px}.solid{background:#516b76}.tunnel{background:#65dbe8}
@media (max-height:700px){#app{grid-template-rows:auto 132px 1fr auto}.control{min-height:62px}.preview{transform:scale(.82);transform-origin:center}}
</style>
</head>
<body>
<div id="app">
  <div id="fallBall" class="fall-ball" aria-hidden="true"></div>
  <header class="hud">
    <div><div class="score">SCORE <span id="score">000000</span></div><div class="sub">CUBO VIVO · PROTOTIPO 0.8</div></div>
    <div class="status"><div id="stateLabel">PREPARADO</div><div id="cubeCount">27 cubos</div></div>
  </header>

  <section class="preview-wrap">
    <div class="preview-title">PRÓXIMA BOLA · MATRIZ 3×3</div>
    <div id="preview" class="preview"></div>
    <div id="countdown" class="countdown">2.0 s</div>
  </section>

  <main class="stage">
    <canvas id="game"></canvas>
    <button id="restart" class="restart">REINICIAR</button>
    <div id="message" class="message"></div>
    <div class="legend"><span class="key solid"></span>sólido &nbsp; <span class="key tunnel"></span>túnel</div>
  </main>

  <footer class="controls">
    <button id="rotateA" class="control">↺<small>GIRO A · EJE X</small></button>
    <button id="rotateB" class="control">↻<small>GIRO B · EJE Y</small></button>
  </footer>
</div>
<script>
(() => {
'use strict';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const stateLabel = document.getElementById('stateLabel');
const cubeCountEl = document.getElementById('cubeCount');
const countdownEl = document.getElementById('countdown');
const previewEl = document.getElementById('preview');
const msgEl = document.getElementById('message');
const fallBallEl = document.getElementById('fallBall');
const appEl = document.getElementById('app');
const rotateABtn = document.getElementById('rotateA');
const rotateBBtn = document.getElementById('rotateB');

const N = 3;
const FALL_TIME = 2.0;
// Keep one constant spatial speed before, through and just below the cube.
const BALL_START_Z = 8;
const BALL_ENTRY_Z = N + .2;
const BALL_EXIT_Z = -4.2;
const BALL_SPEED = (BALL_START_Z - BALL_ENTRY_Z) / FALL_TIME;
const TRAVERSE_TIME = (BALL_ENTRY_Z - BALL_EXIT_Z) / BALL_SPEED;
const ROT_TIME = 0.18;
const Cell = Object.freeze({ EMPTY:0, SOLID:1, TX:2, TY:3, TZ:4 });
let grid, score, state, timer, nextBall, activeBall, rotAnim, gameOver, lastTime, breakBursts;

function makeGrid(){ return Array.from({length:N},()=>Array.from({length:N},()=>Array(N).fill(Cell.SOLID))); }
function setCell(x,y,z,v){ grid[x][y][z]=v; }
function reset(){
  grid=makeGrid(); score=0; gameOver=false; rotAnim=null; activeBall=null; breakBursts=[];
  // Three original tunnels, one per axis: center, edge, corner.
  for(let x=0;x<N;x++) setCell(x,1,1,Cell.TX);       // central X tunnel
  for(let y=0;y<N;y++) setCell(1,y,0,Cell.TY);       // edge Y tunnel
  for(let z=0;z<N;z++) setCell(0,0,z,Cell.TZ);       // corner Z tunnel
  spawnNext(); state='FALLING'; timer=0; lastTime=performance.now(); fallBallEl.style.opacity='0'; updateUI();
}
function spawnNext(){ nextBall={row:Math.floor(Math.random()*3), col:Math.floor(Math.random()*3)}; renderPreview(); }
function renderPreview(){
  previewEl.innerHTML='';
  const cw=52,ch=32, ox=72, oy=4;
  for(let r=0;r<3;r++) for(let c=0;c<3;c++){
    const d=document.createElement('div'); d.className='cell'+(nextBall&&nextBall.row===r&&nextBall.col===c?' active':'');
    d.style.left=(ox+(c-r)*cw*.5)+'px'; d.style.top=(oy+(c+r)*ch*.5)+'px';
    d.style.zIndex=String(r+c);
    if(nextBall&&nextBall.row===r&&nextBall.col===c){const dot=document.createElement('div');dot.className='dot';d.appendChild(dot);} previewEl.appendChild(d);
  }
}
function requestRotation(type){
  // No queue: ignore presses while a rotation is playing or the ball is crossing.
  if(gameOver || rotAnim || state==='RESOLVING') return;
  rotAnim={type,t:0};
}
function rotateGridX(){
  const ng=Array.from({length:N},()=>Array.from({length:N},()=>Array(N).fill(Cell.EMPTY)));
  for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++){
    let v=grid[x][y][z]; let nv=v;
    if(v===Cell.TY) nv=Cell.TZ; else if(v===Cell.TZ) nv=Cell.TY;
    ng[x][N-1-z][y]=nv;
  } grid=ng;
}
function rotateGridY(){
  const ng=Array.from({length:N},()=>Array.from({length:N},()=>Array(N).fill(Cell.EMPTY)));
  for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++){
    let v=grid[x][y][z]; let nv=v;
    if(v===Cell.TX) nv=Cell.TZ; else if(v===Cell.TZ) nv=Cell.TX;
    ng[z][y][N-1-x]=nv;
  } grid=ng;
}
function topColumnFromPreview(row,col){ return {x:col,y:row}; }
function resolveBall(){
  const {x,y}=topColumnFromPreview(nextBall.row,nextBall.col);
  const hits=[]; let clear=true;
  for(let z=N-1;z>=0;z--){
    const v=grid[x][y][z];
    if(v===Cell.EMPTY) continue;
    if(v!==Cell.TZ){ clear=false; hits.push({x,y,z}); }
  }
  hits.sort((a,b)=>b.z-a.z);
  activeBall={x,y,t:0,clear,hits,nextHit:0,currentZ:BALL_ENTRY_Z};
  state='RESOLVING'; timer=0;
  if(clear){ score+=100; showMessage('PASO LIMPIO +100'); }
  else { showMessage(`IMPACTO · ${hits.length} BLOQUE${hits.length!==1?'S':''}`); }
}
function finishResolution(){
  // Safety: if a very slow frame skipped a contact, finish remaining impacts in order.
  if(activeBall && !activeBall.clear){
    while(activeBall.nextHit<activeBall.hits.length){
      breakHit(activeBall.hits[activeBall.nextHit++]);
    }
  }
  activeBall=null;
  const count=countCubes();
  if(count===0){ gameOver=true; state='GAME OVER'; showMessage('GAME OVER'); updateUI(); return; }
  spawnNext(); state='FALLING'; timer=0;
}
function countCubes(){let n=0;for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++)if(grid[x][y][z]!==Cell.EMPTY)n++;return n;}
function breakHit(p){
  if(grid[p.x][p.y][p.z]===Cell.EMPTY) return;
  grid[p.x][p.y][p.z]=Cell.EMPTY;
  score+=10;
  breakBursts.push({x:p.x,y:p.y,z:p.z,t:0});
}
function processSequentialBreaks(){
  if(!activeBall || activeBall.clear) return;
  const z=activeBall.currentZ;
  while(activeBall.nextHit<activeBall.hits.length){
    const hit=activeBall.hits[activeBall.nextHit];
    // Break only when the descending sphere reaches this cube's centre.
    if(z>hit.z+.18) break;
    breakHit(hit);
    activeBall.nextHit++;
  }
}
function showMessage(text){msgEl.textContent=text;msgEl.classList.add('show');clearTimeout(showMessage._t);showMessage._t=setTimeout(()=>msgEl.classList.remove('show'),850);}
function update(dt){
  if(gameOver) return;
  if(rotAnim){
    rotAnim.t+=dt;
    if(rotAnim.t>=ROT_TIME){ if(rotAnim.type==='A') rotateGridX(); else rotateGridY(); rotAnim=null; }
  }
  timer+=dt;
  if(state==='FALLING' && timer>=FALL_TIME) resolveBall();
  else if(state==='RESOLVING'){
    activeBall.t=Math.min(1,timer/TRAVERSE_TIME);
    activeBall.currentZ=BALL_ENTRY_Z-activeBall.t*(BALL_ENTRY_Z-BALL_EXIT_Z);
    processSequentialBreaks();
    if(timer>=TRAVERSE_TIME) finishResolution();
  }
  for(const b of breakBursts) b.t+=dt;
  breakBursts=breakBursts.filter(b=>b.t<.34);
}
function updateFallBallOverlay(){
  if(state!=='FALLING' || !nextBall){
    fallBallEl.style.opacity='0';
    return;
  }
  const active=previewEl.querySelector('.cell.active');
  if(!active) return;
  const appRect=appEl.getBoundingClientRect();
  const cellRect=active.getBoundingClientRect();
  const canvasRect=canvas.getBoundingClientRect();
  const startX=cellRect.left+cellRect.width/2-appRect.left;
  const startY=cellRect.top+cellRect.height/2-appRect.top;
  const {x,y}=topColumnFromPreview(nextBall.row,nextBall.col);
  const w=canvas.clientWidth,h=canvas.clientHeight;
  const s=Math.min(w/6.2,h/6.2), ox=w/2, oy=h*.64;
  const target=project(x,y,BALL_ENTRY_Z,ox,oy,s);
  const endX=canvasRect.left-appRect.left+target.x;
  const endY=canvasRect.top-appRect.top+target.y;
  const p=Math.max(0,Math.min(1,timer/FALL_TIME));
  const xPos=startX+(endX-startX)*p;
  const yPos=startY+(endY-startY)*p;
  fallBallEl.style.left=xPos+'px';
  fallBallEl.style.top=yPos+'px';
  fallBallEl.style.opacity='1';
  const dot=active.querySelector('.dot'); if(dot) dot.style.opacity=p<.025?'1':'0';
}
function updateUI(){
  scoreEl.textContent=String(score).padStart(6,'0');
  stateLabel.textContent=gameOver?'GAME OVER':state;
  cubeCountEl.textContent=`${countCubes()} cubos`;
  const remaining=state==='FALLING'?Math.max(0,FALL_TIME-timer):0;
  countdownEl.textContent=state==='FALLING'?remaining.toFixed(1)+' s':state==='RESOLVING'?'CRUZANDO':'—';
  const locked = gameOver || state==='RESOLVING' || !!rotAnim;
  rotateABtn.disabled=locked; rotateBBtn.disabled=locked;
}
function resize(){
  const r=canvas.getBoundingClientRect(); const dpr=Math.min(2,window.devicePixelRatio||1);
  canvas.width=Math.round(r.width*dpr);canvas.height=Math.round(r.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);
}
function project(x,y,z, ox,oy,s){ return {x:ox+(x-y)*s*.56,y:oy+(x+y)*s*.30-z*s*.62}; }
function easeInOut(t){ return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function rotatePointAroundCenter(x,y,z){
  if(!rotAnim) return {x,y,z};
  const a=easeInOut(Math.min(1,rotAnim.t/ROT_TIME))*Math.PI/2;
  const cx=(N-1)/2, cy=(N-1)/2, cz=(N-1)/2;
  let X=x-cx,Y=y-cy,Z=z-cz,nx=X,ny=Y,nz=Z;
  if(rotAnim.type==='A'){ ny=Y*Math.cos(a)-Z*Math.sin(a); nz=Y*Math.sin(a)+Z*Math.cos(a); }
  else { nx=X*Math.cos(a)+Z*Math.sin(a); nz=-X*Math.sin(a)+Z*Math.cos(a); }
  return {x:nx+cx,y:ny+cy,z:nz+cz};
}
function transformVector(x,y,z){
  if(!rotAnim) return {x,y,z};
  const a=easeInOut(Math.min(1,rotAnim.t/ROT_TIME))*Math.PI/2;
  if(rotAnim.type==='A') return {x,y:y*Math.cos(a)-z*Math.sin(a),z:y*Math.sin(a)+z*Math.cos(a)};
  return {x:x*Math.cos(a)+z*Math.sin(a),y,z:-x*Math.sin(a)+z*Math.cos(a)};
}
function shade(hex,amt){ const n=parseInt(hex.slice(1),16),r=Math.max(0,Math.min(255,(n>>16)+amt)),g=Math.max(0,Math.min(255,((n>>8)&255)+amt)),b=Math.max(0,Math.min(255,(n&255)+amt));return `rgb(${r},${g},${b})`; }
function poly(points,fill,stroke){ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);for(let i=1;i<points.length;i++)ctx.lineTo(points[i].x,points[i].y);ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke();}}
const FACE_DEFS=[
  {idx:[4,5,6,7],normal:{x:0,y:0,z:1}},
  {idx:[0,3,2,1],normal:{x:0,y:0,z:-1}},
  {idx:[1,2,6,5],normal:{x:1,y:0,z:0}},
  {idx:[0,4,7,3],normal:{x:-1,y:0,z:0}},
  {idx:[3,7,6,2],normal:{x:0,y:1,z:0}},
  {idx:[0,1,5,4],normal:{x:0,y:-1,z:0}}
];
function polygonArea(points){
  let a=0;
  for(let i=0;i<points.length;i++){
    const p=points[i],q=points[(i+1)%points.length];
    a+=p.x*q.y-q.x*p.y;
  }
  return a*.5;
}
function cubeGeometry(x,y,z,ox,oy,s){
  const h=.49;
  const raw=[
    [x-h,y-h,z-h],[x+h,y-h,z-h],[x+h,y+h,z-h],[x-h,y+h,z-h],
    [x-h,y-h,z+h],[x+h,y-h,z+h],[x+h,y+h,z+h],[x-h,y+h,z+h]
  ];
  const world=raw.map(v=>rotatePointAroundCenter(v[0],v[1],v[2]));
  const pts=world.map(v=>project(v.x,v.y,v.z,ox,oy,s));
  const faces=FACE_DEFS.map(f=>{
    const points=f.idx.map(i=>pts[i]);
    const normal=transformVector(f.normal.x,f.normal.y,f.normal.z);
    return {
      ...f,
      points,
      normal,
      area:polygonArea(points),
      screenY:points.reduce((a,p)=>a+p.y,0)/points.length
    };
  });
  return {world,pts,faces};
}
function drawFace(points,fill,stroke){ poly(points,fill,stroke); }
function faceFill(base,normal){
  const light={x:-.35,y:-.48,z:.80};
  const d=Math.max(-1,Math.min(1,normal.x*light.x+normal.y*light.y+normal.z*light.z));
  return shade(base,Math.round(-20+(d+1)*19));
}
function tunnelAxis(v){ return v===Cell.TX?{x:1,y:0,z:0}:v===Cell.TY?{x:0,y:1,z:0}:{x:0,y:0,z:1}; }
function drawTunnelGraphic(x,y,z,v,ox,oy,s,alpha){
  const c=rotatePointAroundCenter(x,y,z);
  const av=transformVector(...Object.values(tunnelAxis(v)));
  const len=.47;
  const a3={x:c.x-av.x*len,y:c.y-av.y*len,z:c.z-av.z*len};
  const b3={x:c.x+av.x*len,y:c.y+av.y*len,z:c.z+av.z*len};
  const A=project(a3.x,a3.y,a3.z,ox,oy,s), B=project(b3.x,b3.y,b3.z,ox,oy,s);
  const near=A.y>B.y?A:B, far=A.y>B.y?B:A;
  const dx=B.x-A.x,dy=B.y-A.y,ang=Math.atan2(dy,dx);
  const major=s*.15,minor=s*.065;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.lineCap='round';
  ctx.strokeStyle='rgba(205,255,255,.28)';ctx.lineWidth=s*.12;
  ctx.beginPath();ctx.moveTo(far.x,far.y);ctx.lineTo(near.x,near.y);ctx.stroke();
  ctx.setLineDash([2.5,5]);ctx.strokeStyle='rgba(225,255,255,.82)';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(far.x,far.y);ctx.lineTo(near.x,near.y);ctx.stroke();ctx.setLineDash([]);
  // The mouth lies on a plane perpendicular to the tunnel axis, so its
  // long visual axis must be rotated 90 degrees from the projected tunnel line.
  const mouthAngle=ang+Math.PI/2;
  // Both ends use the same visual language in X, Y and Z: black opening,
  // cyan-white rim. Depth is communicated only by opacity and line weight.
  function drawMouth(p, opacity, width){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(mouthAngle);ctx.globalAlpha=opacity*alpha;
    ctx.fillStyle='#02090d';ctx.strokeStyle='rgba(218,255,255,.95)';ctx.lineWidth=width;
    ctx.beginPath();ctx.ellipse(0,0,major,minor,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle='rgba(80,205,220,.72)';ctx.lineWidth=Math.max(1,width*.45);
    ctx.beginPath();ctx.ellipse(0,0,major*.78,minor*.72,0,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  drawMouth(far,.32,1.35);
  drawMouth(near,.96,2.0);
  ctx.restore();
}
function drawVoxel(x,y,z,v,ox,oy,s,alpha=1){
  const geom=cubeGeometry(x,y,z,ox,oy,s);
  const isTunnel=v!==Cell.SOLID;
  const base=isTunnel?'#3ab8c7':'#49616b';
  const visible=geom.faces.filter(f=>f.area>0.01).sort((a,b)=>a.screenY-b.screenY);
  ctx.save();ctx.globalAlpha=alpha*(isTunnel?.72:1);
  for(const face of visible){
    drawFace(face.points,faceFill(base,face.normal),isTunnel?'rgba(215,255,255,.24)':'rgba(210,250,255,.17)');
  }
  ctx.restore();
  if(isTunnel) drawTunnelGraphic(x,y,z,v,ox,oy,s,alpha);
}
function drawGhostGrid(ox,oy,s){
  ctx.save();ctx.globalAlpha=.22;ctx.strokeStyle='rgba(140,225,235,.36)';ctx.lineWidth=.75;
  for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++){
    const g=cubeGeometry(x,y,z,ox,oy,s);
    const visible=g.faces.filter(f=>f.area>0.01).sort((a,b)=>a.screenY-b.screenY);
    for(const f of visible){
      const pts=f.points;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.closePath();ctx.stroke();
    }
  }
  ctx.restore();
}
function drawBallAt(x,y,zFloat,ox,oy,s){ const p=project(x,y,zFloat,ox,oy,s); const r=s*.17; const g=ctx.createRadialGradient(p.x-r*.35,p.y-r*.45,2,p.x,p.y,r);g.addColorStop(0,'#fff');g.addColorStop(.18,'#ffc0c0');g.addColorStop(.6,'#ff6262');g.addColorStop(1,'#861826');ctx.fillStyle=g;ctx.shadowColor='rgba(255,90,90,.75)';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
function drawBreakBurst(b,ox,oy,s){
  const p=project(b.x,b.y,b.z,ox,oy,s);
  const q=Math.min(1,b.t/.34), fade=1-q;
  ctx.save();
  ctx.globalAlpha=fade;
  ctx.strokeStyle='rgba(205,250,255,.95)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(p.x,p.y,s*(.08+.28*q),0,Math.PI*2);ctx.stroke();
  const dirs=[[-1,-.75],[1,-.8],[-.9,.65],[.9,.7],[0,-1.15],[0,1.05]];
  ctx.fillStyle='rgba(120,205,220,.9)';
  for(let i=0;i<dirs.length;i++){
    const d=dirs[i],dist=s*(.05+.30*q),sz=s*(.035*(1-q*.45));
    const x=p.x+d[0]*dist,y=p.y+d[1]*dist;
    ctx.save();ctx.translate(x,y);ctx.rotate(i*.73+q);ctx.fillRect(-sz/2,-sz/2,sz,sz);ctx.restore();
  }
  ctx.restore();
}
function render(){
  const w=canvas.clientWidth,h=canvas.clientHeight;ctx.clearRect(0,0,w,h);
  const s=Math.min(w/6.2,h/6.2); const ox=w/2, oy=h*.64;
  // Guide line from preview to cube.
  ctx.strokeStyle='rgba(110,231,242,.18)';ctx.setLineDash([5,7]);ctx.beginPath();ctx.moveTo(w/2,5);ctx.lineTo(w/2,h*.38);ctx.stroke();ctx.setLineDash([]);
  drawGhostGrid(ox,oy,s);
  const items=[];
  for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++)if(grid[x][y][z]!==Cell.EMPTY){
    const rp=rotatePointAroundCenter(x,y,z); items.push({kind:'voxel',x,y,z,v:grid[x][y][z],depth:rp.x+rp.y+rp.z});
  }
  if(state==='RESOLVING'&&activeBall){
    const z=activeBall.currentZ;
    items.push({kind:'ball',x:activeBall.x,y:activeBall.y,z,depth:activeBall.x+activeBall.y+z+.35});
  }
  items.sort((a,b)=>a.depth-b.depth);
  for(const it of items){
    if(it.kind==='voxel') drawVoxel(it.x,it.y,it.z,it.v,ox,oy,s);
    else drawBallAt(it.x,it.y,it.z,ox,oy,s);
  }
  for(const b of breakBursts) drawBreakBurst(b,ox,oy,s);
  if(rotAnim){
    ctx.fillStyle='rgba(110,231,242,.7)';ctx.font='700 12px system-ui';ctx.textAlign='center';ctx.fillText(rotAnim.type==='A'?'GIRO A':'GIRO B',w/2,h-18);
  }
}
function loop(now){ const dt=Math.min(.05,(now-lastTime)/1000||0);lastTime=now;update(dt);updateUI();render();updateFallBallOverlay();requestAnimationFrame(loop); }

document.getElementById('rotateA').addEventListener('pointerdown',()=>requestRotation('A'));
document.getElementById('rotateB').addEventListener('pointerdown',()=>requestRotation('B'));
document.getElementById('restart').addEventListener('click',reset);
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a')requestRotation('A');if(e.key==='ArrowRight'||e.key.toLowerCase()==='d')requestRotation('B');if(e.key.toLowerCase()==='r')reset();});
window.addEventListener('resize',resize);
resize();reset();requestAnimationFrame(loop);
})();
</script>
