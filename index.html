<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cubo Vivo — Prototipo v0.16</title>
<style>
:root{--bg:#071016;--panel:#0d1a22;--line:#2a4c5c;--text:#e7fbff;--muted:#81aab8;--cyan:#6ee7f2;--red:#ff6b6b;--btn:#102630;--ball-size:20px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:radial-gradient(circle at 50% 20%,#102431 0,#071016 50%,#04090d 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
body{display:flex;justify-content:center;align-items:stretch}
#app{position:relative;width:min(100vw,560px);height:100dvh;display:grid;grid-template-rows:auto 142px 1fr;gap:4px;padding:max(10px,env(safe-area-inset-top)) 10px max(8px,env(safe-area-inset-bottom))}
.hud{display:flex;justify-content:space-between;align-items:center;padding:2px 4px}.score{font-weight:800;letter-spacing:.12em;font-size:20px}.sub{font-size:11px;color:var(--muted);margin-top:2px}.restart-top{width:38px;height:38px;border:1px solid rgba(110,231,242,.3);border-radius:50%;background:rgba(8,24,31,.72);color:#c7f8fb;font-size:20px;display:grid;place-items:center;padding:0;touch-action:manipulation}.restart-top:active{transform:scale(.96)}
.preview-wrap{position:relative;z-index:40;padding:0;display:flex;align-items:center;justify-content:center;overflow:visible;background:none;border:0;box-shadow:none}
.preview{position:relative;width:220px;height:126px;flex:0 0 auto}.preview-grid{position:absolute;inset:0;width:100%;height:100%;overflow:visible}.preview-grid polygon,.preview-grid line{fill:none;stroke:rgba(110,231,242,.42);stroke-width:1.05;vector-effect:non-scaling-stroke}.cell{position:absolute;width:58px;height:36px;display:grid;place-items:center;pointer-events:none}.dot{position:relative;z-index:2;width:var(--ball-size);height:var(--ball-size);border-radius:50%;background:radial-gradient(circle at 35% 30%,#f5eded 0 8%,#b99a9d 12%,#8d676d 56%,#4b3238 100%);box-shadow:0 0 12px rgba(154,105,112,.48);opacity:1;transform:scale(1)}.dot.materializing{animation:materializeBall 1.15s cubic-bezier(.18,.72,.22,1) both}.dot.pre-drop-blink{animation:preDropBlink .34s ease-in-out 1 both}@keyframes preDropBlink{0%,100%{opacity:1;filter:brightness(1)}45%{opacity:.22;filter:brightness(1.9)}}@keyframes materializeBall{0%{opacity:0;transform:scale(.12);filter:blur(6px)}28%{opacity:.16;transform:scale(.42);filter:blur(3.8px)}72%{opacity:.76;transform:scale(1.04);filter:blur(.8px)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
.fall-ball{position:absolute;left:0;top:0;width:var(--ball-size);height:var(--ball-size);border-radius:50%;z-index:30;pointer-events:none;opacity:0;background:radial-gradient(circle at 35% 30%,#fff 0 8%,#ffb0b0 10%,#ff6b6b 55%,#9b1825 100%);box-shadow:0 0 16px rgba(255,107,107,.82);transform:translate(-50%,-50%)}
.stage{position:relative;min-height:0;overflow:hidden;background:none;border-radius:0}
canvas{width:100%;height:100%;display:block;touch-action:none}.message,.legend,.countdown{display:none}
.rotate-circle{position:absolute;z-index:40;bottom:18px;width:54px;height:54px;border:1px solid rgba(110,231,242,.48);border-radius:50%;background:rgba(8,26,34,.76);color:#d9fbff;font-size:30px;line-height:1;display:grid;place-items:center;padding:0;box-shadow:0 6px 20px rgba(0,0,0,.24);touch-action:manipulation}.rotate-circle.left{left:12px}.rotate-circle.right{right:12px}.rotate-circle:active{transform:scale(.96);background:rgba(18,56,68,.85)}.rotate-circle:disabled{opacity:.28;filter:saturate(.45);transform:none}
@media (max-height:700px){#app{grid-template-rows:auto 118px 1fr}.preview{transform:scale(.86);transform-origin:center}.rotate-circle{bottom:10px;width:48px;height:48px;font-size:27px}}
</style>
</head>
<body>
<div id="app">
  <div id="fallBall" class="fall-ball" aria-hidden="true"></div>
  <header class="hud">
    <div><div class="score">SCORE <span id="score">000000</span></div><div class="sub">CUBO VIVO · PROTOTIPO 0.16</div></div>
    <button id="restart" class="restart-top" aria-label="Reiniciar">↻</button>
  </header>

  <section class="preview-wrap">
    <div id="preview" class="preview"></div>
  </section>

  <main class="stage">
    <canvas id="game"></canvas>
    <button id="rotateA" class="rotate-circle left" aria-label="Girar eje X">↺</button>
    <button id="rotateB" class="rotate-circle right" aria-label="Girar eje Y">↻</button>
  </main>
</div>
<script>
(() => {
'use strict';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const previewEl = document.getElementById('preview');
const fallBallEl = document.getElementById('fallBall');
const appEl = document.getElementById('app');
const rotateABtn = document.getElementById('rotateA');
const rotateBBtn = document.getElementById('rotateB');

const N = 3;
const FALL_TIME = 5.4;
// Keep one constant spatial speed before, through and just below the cube.
const BALL_START_Z = 8;
const BALL_ENTRY_Z = N + .2;
const BALL_EXIT_Z = -6.2;
const BALL_SPEED = (BALL_START_Z - BALL_ENTRY_Z) / FALL_TIME;
// The crossing duration is calculated per wave from the same on-screen speed.
let traverseDuration = (BALL_ENTRY_Z - BALL_EXIT_Z) / BALL_SPEED;
const ROT_TIME = 0.18;
const FIRST_PREP_TIME = 1.55;
const NEXT_PREP_TIME = 0;
const MATRIX_EXIT_Z = -0.5;
const PRE_DROP_BLINK_TIME = 0.34;
const PREVIEW_REVEAL_DELAY = 0.42;
const Cell = Object.freeze({ EMPTY:0, SOLID:1, TX:2, TY:3, TZ:4 });
let grid, score, state, timer, currentBall, queuedBall, activeBall, departingBalls, rotAnim, gameOver, lastTime, breakBursts, previewMaterialize, previewRevealTimer, queuedVisible, prepareDuration, previewBlinking, audioCtx;

function makeGrid(){ return Array.from({length:N},()=>Array.from({length:N},()=>Array(N).fill(Cell.SOLID))); }
function setCell(x,y,z,v){ grid[x][y][z]=v; }
function reset(){
  grid=makeGrid(); score=0; gameOver=false; rotAnim=null; activeBall=null; departingBalls=[]; breakBursts=[]; previewBlinking=false;
  // Three original tunnels, one per axis: center, edge, corner.
  for(let x=0;x<N;x++) setCell(x,1,1,Cell.TX);       // central X tunnel
  for(let y=0;y<N;y++) setCell(1,y,0,Cell.TY);       // edge Y tunnel
  for(let z=0;z<N;z++) setCell(0,0,z,Cell.TZ);       // corner Z tunnel
  currentBall=randomBall(); queuedBall=randomBall(currentBall); previewMaterialize=true; previewRevealTimer=0; queuedVisible=false; prepareDuration=FIRST_PREP_TIME;
  state='PREPARING'; timer=0; renderPreview(); lastTime=performance.now(); fallBallEl.style.opacity='0'; updateUI();
}
function randomBall(exclude=null){
  let ball;
  do { ball={row:Math.floor(Math.random()*3), col:Math.floor(Math.random()*3)}; }
  while(exclude && ball.row===exclude.row && ball.col===exclude.col);
  return ball;
}
function advanceBallQueue(startImmediately=false){
  currentBall=queuedBall;
  queuedBall=randomBall(currentBall);
  previewMaterialize=false;
  previewRevealTimer=0;
  queuedVisible=false;
  previewBlinking=false;
  prepareDuration=startImmediately?0:NEXT_PREP_TIME;
  state=startImmediately?'FALLING':'PREPARING';
  timer=0;
  renderPreview();
  if(startImmediately) playSound('drop');
}
function renderPreview(){
  previewEl.innerHTML='';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','preview-grid');
  svg.setAttribute('viewBox','0 0 220 126');
  svg.setAttribute('aria-hidden','true');
  const pts=[];
  const ox=110,oy=9,cw=72,ch=36;
  for(let r=0;r<=3;r++){
    pts[r]=[];
    for(let c=0;c<=3;c++) pts[r][c]={x:ox+(c-r)*cw/2,y:oy+(c+r)*ch/2};
  }
  const outline=document.createElementNS(svg.namespaceURI,'polygon');
  outline.setAttribute('points',[pts[0][0],pts[0][3],pts[3][3],pts[3][0]].map(p=>`${p.x},${p.y}`).join(' '));
  svg.appendChild(outline);
  for(let i=1;i<3;i++){
    const l1=document.createElementNS(svg.namespaceURI,'line');
    l1.setAttribute('x1',pts[0][i].x);l1.setAttribute('y1',pts[0][i].y);l1.setAttribute('x2',pts[3][i].x);l1.setAttribute('y2',pts[3][i].y);svg.appendChild(l1);
    const l2=document.createElementNS(svg.namespaceURI,'line');
    l2.setAttribute('x1',pts[i][0].x);l2.setAttribute('y1',pts[i][0].y);l2.setAttribute('x2',pts[i][3].x);l2.setAttribute('y2',pts[i][3].y);svg.appendChild(l2);
  }
  previewEl.appendChild(svg);
  for(let r=0;r<3;r++) for(let c=0;c<3;c++){
    const shownBall=state==='PREPARING'?currentBall:(queuedVisible?queuedBall:null);
    const isQueued=shownBall&&shownBall.row===r&&shownBall.col===c;
    const d=document.createElement('div'); d.className='cell';
    d.dataset.row=String(r); d.dataset.col=String(c);
    const center={x:(pts[r][c].x+pts[r][c+1].x+pts[r+1][c+1].x+pts[r+1][c].x)/4,y:(pts[r][c].y+pts[r][c+1].y+pts[r+1][c+1].y+pts[r+1][c].y)/4};
    d.style.left=(center.x-29)+'px';d.style.top=(center.y-18)+'px';
    if(isQueued){const dot=document.createElement('div');dot.className='dot'+(previewMaterialize?' materializing':'')+(previewBlinking?' pre-drop-blink':'');d.appendChild(dot);} previewEl.appendChild(d);
  }
  previewMaterialize=false;
}
function requestRotation(type){
  // Rotation is locked only while a ball is physically inside the matrix.
  if(gameOver || rotAnim || (activeBall && activeBall.currentZ>MATRIX_EXIT_Z)) return;
  ensureAudio();
  playSound('rotate');
  rotAnim={type,t:0};
}
function rotateGridX(){
  const ng=Array.from({length:N},()=>Array.from({length:N},()=>Array(N).fill(Cell.EMPTY)));
  for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++){
    let v=grid[x][y][z]; let nv=v;
    if(v===Cell.TY) nv=Cell.TZ; else if(v===Cell.TZ) nv=Cell.TY;
    // Botón izquierdo: giro de -90° alrededor de X.
    ng[x][z][N-1-y]=nv;
  } grid=ng;
}
function rotateGridY(){
  const ng=Array.from({length:N},()=>Array.from({length:N},()=>Array(N).fill(Cell.EMPTY)));
  for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++){
    let v=grid[x][y][z]; let nv=v;
    if(v===Cell.TX) nv=Cell.TZ; else if(v===Cell.TZ) nv=Cell.TX;
    ng[z][y][N-1-x]=nv;
  } grid=ng;
}
function topColumnFromPreview(row,col){ return {x:col,y:row}; }
function calculateTraverseDuration(ball){
  const originCell=previewEl.querySelector(`.cell[data-row="${ball.row}"][data-col="${ball.col}"]`);
  if(!originCell) return (BALL_ENTRY_Z-BALL_EXIT_Z)/BALL_SPEED;
  const appRect=appEl.getBoundingClientRect();
  const cellRect=originCell.getBoundingClientRect();
  const canvasRect=canvas.getBoundingClientRect();
  const start={x:cellRect.left+cellRect.width/2-appRect.left,y:cellRect.top+cellRect.height/2-appRect.top};
  const w=canvas.clientWidth,h=canvas.clientHeight;
  const s=Math.min(w/6.2,h/6.2),ox=w/2,oy=h*.69;
  const {x,y}=topColumnFromPreview(ball.row,ball.col);
  const entryLocal=project(x,y,BALL_ENTRY_Z,ox,oy,s);
  const exitLocal=project(x,y,BALL_EXIT_Z,ox,oy,s);
  const entry={x:canvasRect.left-appRect.left+entryLocal.x,y:canvasRect.top-appRect.top+entryLocal.y};
  const exit={x:canvasRect.left-appRect.left+exitLocal.x,y:canvasRect.top-appRect.top+exitLocal.y};
  const outsideDistance=Math.hypot(entry.x-start.x,entry.y-start.y);
  const insideDistance=Math.hypot(exit.x-entry.x,exit.y-entry.y);
  const pxPerSecond=Math.max(1,outsideDistance/FALL_TIME);
  return insideDistance/pxPerSecond;
}
function resolveBall(){
  const {x,y}=topColumnFromPreview(currentBall.row,currentBall.col);
  const hits=[]; let clear=true;
  for(let z=N-1;z>=0;z--){
    const v=grid[x][y][z];
    if(v===Cell.EMPTY) continue;
    if(v!==Cell.TZ){ clear=false; hits.push({x,y,z}); }
  }
  hits.sort((a,b)=>b.z-a.z);
  traverseDuration=calculateTraverseDuration(currentBall);
  activeBall={x,y,t:0,clear,hits,nextHit:0,nextTunnel:0,currentZ:BALL_ENTRY_Z,duration:traverseDuration,handedOff:false,blinkStarted:false};
  state='RESOLVING'; timer=0;
  if(clear) score+=100;
}
function handOffAfterMatrixExit(){
  if(!activeBall || activeBall.handedOff) return;
  activeBall.handedOff=true;
  departingBalls.push({x:activeBall.x,y:activeBall.y,z:activeBall.currentZ});
  activeBall=null;
  const count=countCubes();
  if(count===0){ gameOver=true; state='GAME OVER'; updateUI(); return; }
  advanceBallQueue(true);
}
function finishResolution(){
  if(activeBall && !activeBall.clear){
    while(activeBall.nextHit<activeBall.hits.length) breakHit(activeBall.hits[activeBall.nextHit++]);
  }
  handOffAfterMatrixExit();
}
function countCubes(){let n=0;for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++)if(grid[x][y][z]!==Cell.EMPTY)n++;return n;}
function breakHit(p){
  if(grid[p.x][p.y][p.z]===Cell.EMPTY) return;
  grid[p.x][p.y][p.z]=Cell.EMPTY;
  score+=10;
  breakBursts.push({x:p.x,y:p.y,z:p.z,t:0});
  playSound('break');
}
function processSequentialBreaks(){
  if(!activeBall || activeBall.clear) return;
  const z=activeBall.currentZ;
  while(activeBall.nextHit<activeBall.hits.length){
    const hit=activeBall.hits[activeBall.nextHit];
    // Break only when the descending sphere reaches this cube's centre.
    if(z>hit.z+.43) break;
    breakHit(hit);
    activeBall.nextHit++;
  }
}
function ensureAudio(){
  if(audioCtx) return audioCtx;
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC) return null;
  audioCtx=new AC();
  if(audioCtx.state==='suspended') audioCtx.resume().catch(()=>{});
  return audioCtx;
}
function tone(freq,duration,volume,type='sine',slide=0){
  const ac=ensureAudio(); if(!ac) return;
  const now=ac.currentTime, osc=ac.createOscillator(), gain=ac.createGain();
  osc.type=type; osc.frequency.setValueAtTime(freq,now);
  if(slide) osc.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide),now+duration);
  gain.gain.setValueAtTime(.0001,now); gain.gain.exponentialRampToValueAtTime(volume,now+.008); gain.gain.exponentialRampToValueAtTime(.0001,now+duration);
  osc.connect(gain).connect(ac.destination); osc.start(now); osc.stop(now+duration+.02);
}
function playSound(kind){
  if(kind==='rotate') tone(170,.08,.035,'triangle',55);
  else if(kind==='break') tone(115,.055,.045,'square',-35);
  else if(kind==='tunnel') { tone(520,.11,.025,'sine',140); setTimeout(()=>tone(780,.09,.018,'sine',80),55); }
  else if(kind==='drop') tone(340,.07,.025,'square',-90);
}
function processTunnelSounds(){
  if(!activeBall) return;
  while(activeBall.nextTunnel<N){
    const z=N-1-activeBall.nextTunnel;
    if(activeBall.currentZ>z+.12) break;
    if(grid[activeBall.x][activeBall.y][z]===Cell.TZ) playSound('tunnel');
    activeBall.nextTunnel++;
  }
}
function update(dt){
  if(gameOver) return;
  if(rotAnim){
    rotAnim.t+=dt;
    if(rotAnim.t>=ROT_TIME){ if(rotAnim.type==='A') rotateGridX(); else rotateGridY(); rotAnim=null; }
  }
  timer+=dt;
  if(state==='PREPARING' && timer>=prepareDuration){
    state='FALLING'; timer=0; previewRevealTimer=0; queuedVisible=false; previewBlinking=false; renderPreview(); playSound('drop');
  }
  if(state==='FALLING' && !queuedVisible){
    previewRevealTimer+=dt;
    if(previewRevealTimer>=PREVIEW_REVEAL_DELAY){ queuedVisible=true; previewMaterialize=true; renderPreview(); }
  }
  if(state==='FALLING' && timer>=FALL_TIME) resolveBall();
  else if(state==='RESOLVING' && activeBall){
    activeBall.t=Math.min(1,timer/activeBall.duration);
    activeBall.currentZ=BALL_ENTRY_Z-activeBall.t*(BALL_ENTRY_Z-BALL_EXIT_Z);
    processSequentialBreaks();
    processTunnelSounds();
    const zPerSecond=(BALL_ENTRY_Z-BALL_EXIT_Z)/activeBall.duration;
    const blinkLeadZ=MATRIX_EXIT_Z+zPerSecond*PRE_DROP_BLINK_TIME;
    if(!activeBall.blinkStarted && activeBall.currentZ<=blinkLeadZ){
      activeBall.blinkStarted=true; previewBlinking=true; renderPreview();
    }
    if(activeBall.currentZ<=MATRIX_EXIT_Z) handOffAfterMatrixExit();
    else if(timer>=activeBall.duration) finishResolution();
  }
  for(const b of departingBalls) b.z-=BALL_SPEED*dt;
  departingBalls=departingBalls.filter(b=>b.z>BALL_EXIT_Z);
  for(const b of breakBursts) b.t+=dt;
  breakBursts=breakBursts.filter(b=>b.t<.34);
}
function syncBallSize(){
  const w=canvas.clientWidth,h=canvas.clientHeight;
  const s=Math.min(w/6.2,h/6.2);
}
function updateFallBallOverlay(){
  if(state!=='FALLING' || !currentBall){
    fallBallEl.style.opacity='0';
    return;
  }
  const originCell=previewEl.querySelector(`.cell[data-row="${currentBall.row}"][data-col="${currentBall.col}"]`);
  if(!originCell) return;
  const appRect=appEl.getBoundingClientRect();
  const cellRect=originCell.getBoundingClientRect();
  const canvasRect=canvas.getBoundingClientRect();
  const startX=cellRect.left+cellRect.width/2-appRect.left;
  const startY=cellRect.top+cellRect.height/2-appRect.top;
  const {x,y}=topColumnFromPreview(currentBall.row,currentBall.col);
  const w=canvas.clientWidth,h=canvas.clientHeight;
  const s=Math.min(w/6.2,h/6.2), ox=w/2, oy=h*.69;
  const target=project(x,y,BALL_ENTRY_Z,ox,oy,s);
  const endX=canvasRect.left-appRect.left+target.x;
  const endY=canvasRect.top-appRect.top+target.y;
  const p=Math.max(0,Math.min(1,timer/FALL_TIME));
  const xPos=startX+(endX-startX)*p;
  const yPos=startY+(endY-startY)*p;
  fallBallEl.style.left=xPos+'px';
  fallBallEl.style.top=yPos+'px';
  fallBallEl.style.opacity='1';
}
function updateUI(){
  scoreEl.textContent=String(score).padStart(6,'0');
  const locked = gameOver || !!rotAnim || !!(activeBall && activeBall.currentZ>MATRIX_EXIT_Z);
  rotateABtn.disabled=locked; rotateBBtn.disabled=locked;
}
function resize(){
  const r=canvas.getBoundingClientRect(); const dpr=Math.min(2,window.devicePixelRatio||1);
  canvas.width=Math.round(r.width*dpr);canvas.height=Math.round(r.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);
  syncBallSize();
}
function project(x,y,z, ox,oy,s){ return {x:ox+(x-y)*s*.56,y:oy+(x+y)*s*.30-z*s*.62}; }
function easeInOut(t){ return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function rotatePointAroundCenter(x,y,z){
  if(!rotAnim) return {x,y,z};
  const direction=rotAnim.type==='A'?-1:1;
  const a=easeInOut(Math.min(1,rotAnim.t/ROT_TIME))*Math.PI/2*direction;
  const cx=(N-1)/2, cy=(N-1)/2, cz=(N-1)/2;
  let X=x-cx,Y=y-cy,Z=z-cz,nx=X,ny=Y,nz=Z;
  if(rotAnim.type==='A'){ ny=Y*Math.cos(a)-Z*Math.sin(a); nz=Y*Math.sin(a)+Z*Math.cos(a); }
  else { nx=X*Math.cos(a)+Z*Math.sin(a); nz=-X*Math.sin(a)+Z*Math.cos(a); }
  return {x:nx+cx,y:ny+cy,z:nz+cz};
}
function transformVector(x,y,z){
  if(!rotAnim) return {x,y,z};
  const direction=rotAnim.type==='A'?-1:1;
  const a=easeInOut(Math.min(1,rotAnim.t/ROT_TIME))*Math.PI/2*direction;
  if(rotAnim.type==='A') return {x,y:y*Math.cos(a)-z*Math.sin(a),z:y*Math.sin(a)+z*Math.cos(a)};
  return {x:x*Math.cos(a)+z*Math.sin(a),y,z:-x*Math.sin(a)+z*Math.cos(a)};
}
function shade(hex,amt){ const n=parseInt(hex.slice(1),16),r=Math.max(0,Math.min(255,(n>>16)+amt)),g=Math.max(0,Math.min(255,((n>>8)&255)+amt)),b=Math.max(0,Math.min(255,(n&255)+amt));return `rgb(${r},${g},${b})`; }
function poly(points,fill,stroke){ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);for(let i=1;i<points.length;i++)ctx.lineTo(points[i].x,points[i].y);ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke();}}
const FACE_DEFS=[
  {idx:[4,5,6,7],normal:{x:0,y:0,z:1}},
  {idx:[0,3,2,1],normal:{x:0,y:0,z:-1}},
  {idx:[1,2,6,5],normal:{x:1,y:0,z:0}},
  {idx:[0,4,7,3],normal:{x:-1,y:0,z:0}},
  {idx:[3,7,6,2],normal:{x:0,y:1,z:0}},
  {idx:[0,1,5,4],normal:{x:0,y:-1,z:0}}
];
function polygonArea(points){
  let a=0;
  for(let i=0;i<points.length;i++){
    const p=points[i],q=points[(i+1)%points.length];
    a+=p.x*q.y-q.x*p.y;
  }
  return a*.5;
}
function cubeGeometry(x,y,z,ox,oy,s){
  const h=.49;
  const raw=[
    [x-h,y-h,z-h],[x+h,y-h,z-h],[x+h,y+h,z-h],[x-h,y+h,z-h],
    [x-h,y-h,z+h],[x+h,y-h,z+h],[x+h,y+h,z+h],[x-h,y+h,z+h]
  ];
  const world=raw.map(v=>rotatePointAroundCenter(v[0],v[1],v[2]));
  const pts=world.map(v=>project(v.x,v.y,v.z,ox,oy,s));
  const faces=FACE_DEFS.map(f=>{
    const points=f.idx.map(i=>pts[i]);
    const normal=transformVector(f.normal.x,f.normal.y,f.normal.z);
    return {
      ...f,
      points,
      normal,
      area:polygonArea(points),
      screenY:points.reduce((a,p)=>a+p.y,0)/points.length
    };
  });
  return {world,pts,faces};
}
function drawFace(points,fill,stroke){ poly(points,fill,stroke); }
function faceFill(base,normal){
  const light={x:-.35,y:-.48,z:.80};
  const d=Math.max(-1,Math.min(1,normal.x*light.x+normal.y*light.y+normal.z*light.z));
  return shade(base,Math.round(-20+(d+1)*19));
}
function tunnelAxis(v){ return v===Cell.TX?{x:1,y:0,z:0}:v===Cell.TY?{x:0,y:1,z:0}:{x:0,y:0,z:1}; }
function drawTunnelGraphic(x,y,z,v,ox,oy,s,alpha){
  const c=rotatePointAroundCenter(x,y,z);
  const av=transformVector(...Object.values(tunnelAxis(v)));
  const len=.47;
  const a3={x:c.x-av.x*len,y:c.y-av.y*len,z:c.z-av.z*len};
  const b3={x:c.x+av.x*len,y:c.y+av.y*len,z:c.z+av.z*len};
  const A=project(a3.x,a3.y,a3.z,ox,oy,s), B=project(b3.x,b3.y,b3.z,ox,oy,s);
  const near=A.y>B.y?A:B, far=A.y>B.y?B:A;
  const dx=B.x-A.x,dy=B.y-A.y,ang=Math.atan2(dy,dx);
  const major=s*.15,minor=s*.065;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.lineCap='round';
  ctx.strokeStyle='rgba(205,255,255,.28)';ctx.lineWidth=s*.12;
  ctx.beginPath();ctx.moveTo(far.x,far.y);ctx.lineTo(near.x,near.y);ctx.stroke();
  ctx.setLineDash([2.5,5]);ctx.strokeStyle='rgba(225,255,255,.82)';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(far.x,far.y);ctx.lineTo(near.x,near.y);ctx.stroke();ctx.setLineDash([]);
  // The mouth lies on a plane perpendicular to the tunnel axis, so its
  // long visual axis must be rotated 90 degrees from the projected tunnel line.
  const mouthAngle=ang+Math.PI/2;
  // Both ends use the same visual language in X, Y and Z: black opening,
  // cyan-white rim. Depth is communicated only by opacity and line weight.
  function drawMouth(p, opacity, width){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(mouthAngle);ctx.globalAlpha=opacity*alpha;
    ctx.fillStyle='#02090d';ctx.strokeStyle='rgba(218,255,255,.95)';ctx.lineWidth=width;
    ctx.beginPath();ctx.ellipse(0,0,major,minor,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle='rgba(80,205,220,.72)';ctx.lineWidth=Math.max(1,width*.45);
    ctx.beginPath();ctx.ellipse(0,0,major*.78,minor*.72,0,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  drawMouth(far,.92,1.9);
  drawMouth(near,.96,2.0);
  ctx.restore();
}
function drawTunnelEntryOverlay(x,y,z,v,ox,oy,s,ballZ){
  if(v!==Cell.TZ) return;
  const axis=tunnelAxis(v);
  const c={x,y,z};
  const entry3={x:c.x+axis.x*.47,y:c.y+axis.y*.47,z:c.z+axis.z*.47};
  const p=project(entry3.x,entry3.y,entry3.z,ox,oy,s);
  const av=axis;
  const a=project(c.x-av.x*.47,c.y-av.y*.47,c.z-av.z*.47,ox,oy,s);
  const b=project(c.x+av.x*.47,c.y+av.y*.47,c.z+av.z*.47,ox,oy,s);
  const mouthAngle=Math.atan2(b.y-a.y,b.x-a.x)+Math.PI/2;
  const dist=Math.abs(ballZ-entry3.z);
  if(dist>.42) return;
  const alpha=Math.max(0,1-dist/.42);
  const major=s*.15, minor=s*.065;
  ctx.save();
  ctx.translate(p.x,p.y);ctx.rotate(mouthAngle);ctx.globalAlpha=.55+.45*alpha;
  ctx.shadowColor='rgba(130,245,255,.95)';ctx.shadowBlur=10+10*alpha;
  ctx.strokeStyle='rgba(235,255,255,.98)';ctx.lineWidth=2.2;
  ctx.beginPath();ctx.ellipse(0,0,major,minor,0,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;ctx.strokeStyle='rgba(75,220,235,.9)';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(0,0,major*.78,minor*.72,0,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}
function drawVoxel(x,y,z,v,ox,oy,s,alpha=1){
  const geom=cubeGeometry(x,y,z,ox,oy,s);
  const isTunnel=v!==Cell.SOLID;
  const base=isTunnel?'#3ab8c7':'#49616b';
  const visible=geom.faces.filter(f=>f.area>0.01).sort((a,b)=>a.screenY-b.screenY);
  ctx.save();ctx.globalAlpha=alpha*(isTunnel?.72:1);
  for(const face of visible){
    drawFace(face.points,faceFill(base,face.normal),isTunnel?'rgba(215,255,255,.24)':'rgba(210,250,255,.17)');
  }
  ctx.restore();
  if(isTunnel) drawTunnelGraphic(x,y,z,v,ox,oy,s,alpha);
}
function cameraDepth(p){ return p.x*.347+p.y*.347+p.z*.336; }
function buildGhostGridItems(ox,oy,s){
  const lines=[];
  const add=(a,b)=>{
    const ra=rotatePointAroundCenter(a.x,a.y,a.z);
    const rb=rotatePointAroundCenter(b.x,b.y,b.z);
    const parts=8;
    for(let i=0;i<parts;i++){
      const t0=i/parts,t1=(i+1)/parts;
      const p0={x:ra.x+(rb.x-ra.x)*t0,y:ra.y+(rb.y-ra.y)*t0,z:ra.z+(rb.z-ra.z)*t0};
      const p1={x:ra.x+(rb.x-ra.x)*t1,y:ra.y+(rb.y-ra.y)*t1,z:ra.z+(rb.z-ra.z)*t1};
      const mid={x:(p0.x+p1.x)/2,y:(p0.y+p1.y)/2,z:(p0.z+p1.z)/2};
      lines.push({kind:'gridline',a:project(p0.x,p0.y,p0.z,ox,oy,s),b:project(p1.x,p1.y,p1.z,ox,oy,s),depth:cameraDepth(mid)});
    }
  };
  // Unique lattice edges of the complete 3×3×3 guide volume.
  for(let i=0;i<N;i++) for(let j=0;j<=N;j++) for(let k=0;k<=N;k++)
    add({x:i-.5,y:j-.5,z:k-.5},{x:i+.5,y:j-.5,z:k-.5});
  for(let i=0;i<=N;i++) for(let j=0;j<N;j++) for(let k=0;k<=N;k++)
    add({x:i-.5,y:j-.5,z:k-.5},{x:i-.5,y:j+.5,z:k-.5});
  for(let i=0;i<=N;i++) for(let j=0;j<=N;j++) for(let k=0;k<N;k++)
    add({x:i-.5,y:j-.5,z:k-.5},{x:i-.5,y:j-.5,z:k+.5});
  return lines;
}
function drawGhostLine(it){
  ctx.save();
  ctx.globalAlpha=.22;
  ctx.strokeStyle='rgba(140,225,235,.36)';
  ctx.lineWidth=.75;
  ctx.beginPath();ctx.moveTo(it.a.x,it.a.y);ctx.lineTo(it.b.x,it.b.y);ctx.stroke();
  ctx.restore();
}
function drawBallAt(x,y,zFloat,ox,oy,s){
  const p=project(x,y,zFloat,ox,oy,s); const r=s*.17;
  ctx.save();
  const halo=ctx.createRadialGradient(p.x,p.y,r*.15,p.x,p.y,r*1.75);
  halo.addColorStop(0,'rgba(255,107,107,.34)');halo.addColorStop(1,'rgba(255,107,107,0)');
  ctx.fillStyle=halo;ctx.beginPath();ctx.arc(p.x,p.y,r*1.75,0,Math.PI*2);ctx.fill();
  const g=ctx.createRadialGradient(p.x-r*.35,p.y-r*.45,2,p.x,p.y,r);
  g.addColorStop(0,'#fff');g.addColorStop(.08,'#fff');g.addColorStop(.10,'#ffb0b0');g.addColorStop(.55,'#ff6b6b');g.addColorStop(1,'#9b1825');
  ctx.fillStyle=g;ctx.shadowColor='rgba(255,107,107,.95)';ctx.shadowBlur=18;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawBreakBurst(b,ox,oy,s){
  const p=project(b.x,b.y,b.z,ox,oy,s);
  const q=Math.min(1,b.t/.34), fade=1-q;
  ctx.save();
  ctx.globalAlpha=fade;
  ctx.strokeStyle='rgba(205,250,255,.95)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(p.x,p.y,s*(.08+.28*q),0,Math.PI*2);ctx.stroke();
  const dirs=[[-1,-.75],[1,-.8],[-.9,.65],[.9,.7],[0,-1.15],[0,1.05]];
  ctx.fillStyle='rgba(120,205,220,.9)';
  for(let i=0;i<dirs.length;i++){
    const d=dirs[i],dist=s*(.05+.30*q),sz=s*(.035*(1-q*.45));
    const x=p.x+d[0]*dist,y=p.y+d[1]*dist;
    ctx.save();ctx.translate(x,y);ctx.rotate(i*.73+q);ctx.fillRect(-sz/2,-sz/2,sz,sz);ctx.restore();
  }
  ctx.restore();
}
function render(){
  const w=canvas.clientWidth,h=canvas.clientHeight;ctx.clearRect(0,0,w,h);
  const s=Math.min(w/6.2,h/6.2); const ox=w/2, oy=h*.69;
  const items=buildGhostGridItems(ox,oy,s);
  for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++)if(grid[x][y][z]!==Cell.EMPTY){
    const rp=rotatePointAroundCenter(x,y,z); items.push({kind:'voxel',x,y,z,v:grid[x][y][z],depth:cameraDepth(rp)});
  }
  if(state==='RESOLVING'&&activeBall){
    const z=activeBall.currentZ;
    items.push({kind:'ball',x:activeBall.x,y:activeBall.y,z,depth:cameraDepth({x:activeBall.x,y:activeBall.y,z})});
  }
  for(const b of departingBalls) items.push({kind:'ball',x:b.x,y:b.y,z:b.z,depth:cameraDepth(b)});
  items.sort((a,b)=>a.depth-b.depth);
  for(const it of items){
    if(it.kind==='voxel') drawVoxel(it.x,it.y,it.z,it.v,ox,oy,s);
    else if(it.kind==='gridline') drawGhostLine(it);
    else drawBallAt(it.x,it.y,it.z,ox,oy,s);
  }
  // Redraw the first vertical tunnel mouth over the sphere while it crosses
  // the entrance plane. This creates the same clear “entering” occlusion seen
  // between lower cubes instead of letting the ball simply float over the rim.
  if(state==='RESOLVING'&&activeBall){
    const topZ=N-1;
    const topCell=grid[activeBall.x][activeBall.y][topZ];
    drawTunnelEntryOverlay(activeBall.x,activeBall.y,topZ,topCell,ox,oy,s,activeBall.currentZ);
  }
  for(const b of breakBursts) drawBreakBurst(b,ox,oy,s);
}
function loop(now){ const dt=Math.min(.05,(now-lastTime)/1000||0);lastTime=now;update(dt);updateUI();render();updateFallBallOverlay();requestAnimationFrame(loop); }

document.getElementById('rotateA').addEventListener('pointerdown',()=>requestRotation('A'));
document.getElementById('rotateB').addEventListener('pointerdown',()=>requestRotation('B'));
document.getElementById('restart').addEventListener('click',()=>{ensureAudio();reset();});
window.addEventListener('keydown',e=>{ensureAudio();if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a')requestRotation('A');if(e.key==='ArrowRight'||e.key.toLowerCase()==='d')requestRotation('B');if(e.key.toLowerCase()==='r')reset();});
window.addEventListener('resize',resize);
resize();reset();requestAnimationFrame(loop);
})();
</script>
